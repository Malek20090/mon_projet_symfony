# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    user_images_directory: '%kernel.project_dir%/public/uploads/users'
    google_ai_api_key_default: ''
    google_ai_model_default: 'gemini-2.5-flash'
    groq_api_key_default: ''
    groq_model_default: 'llama-3.1-8b-instant'
    groq_api_url_default: 'https://api.groq.com/openai/v1/chat/completions'
    openai_api_key_default: ''
    openai_model_default: 'gpt-4o-mini'
    geo_api_key_default: ''
    facepp_base_url: '%env(string:FACEPP_API_BASE_URL)%'
    facepp_min_confidence: '%env(float:FACEPP_MIN_CONFIDENCE)%'
    pdfshift_api_key_default: ''
    pdfshift_processor_version_default: '142'
    GOOGLE_AI_API_KEY: '%env(GOOGLE_AI_API_KEY)%'
    expense_anomaly_sensitivity: 2.5
    expense_anomaly_min_amount: 400
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Service\InvestissementCalculatorService:
        autowire: true
        autoconfigure: true

    App\Service\SalaryExpenseAiService:
        arguments:
            $groqApiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'
            $groqModel: '%env(default:groq_model_default:GROQ_MODEL)%'
            $groqApiUrl: '%env(default:groq_api_url_default:GROQ_API_URL)%'

    App\Service\CasDecisionAiService:
        arguments:
            $openAiApiKey: '%env(default:openai_api_key_default:OPENAI_API_KEY)%'
            $openAiModel: '%env(default:openai_model_default:OPENAI_MODEL)%'

    App\Service\CaseTextAiClassifierService:
        arguments:
            $openAiApiKey: '%env(default:openai_api_key_default:OPENAI_API_KEY)%'
            $openAiModel: '%env(default:openai_model_default:OPENAI_MODEL)%'

    App\Service\PdfShiftService:
        arguments:
            $apiKey: '%env(default:pdfshift_api_key_default:PDFSHIFT_API_KEY)%'
            $processorVersion: '%env(default:pdfshift_processor_version_default:PDFSHIFT_PROCESSOR_VERSION)%'

    App\Service\WhatIfAiNarratorService:
        arguments:
            $cache: '@cache.app'

    App\Service\FacePlusPlusService:
        arguments:
            $apiKey: '%env(string:FACEPP_API_KEY)%'
            $apiSecret: '%env(string:FACEPP_API_SECRET)%'
            $baseUrl: '%facepp_base_url%'
            $minConfidence: '%facepp_min_confidence%'

    App\Controller\Api\SalaryNearbyController:
        arguments:
            $cache: '@cache.app'
            $geoApiKey: '%env(default:geo_api_key_default:GEO_API_KEY)%'
    App\Service\ExpenseAnomalyAIService:
        arguments:
            $sensitivity: '%expense_anomaly_sensitivity%'
            $minAmount: '%expense_anomaly_min_amount%'
    
